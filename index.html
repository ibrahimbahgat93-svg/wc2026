<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>FIFA World Cup 2026</title>
<style>
:root{--bg:#07090C;--bg2:#0C1018;--bg3:#111820;--bdr:#1A2530;--bdr2:#22334A;--gold:#F5C518;--grn:#22C55E;--txt:#DCE8F0;--mut:#4A6A7A;--mut2:#2A3D4A}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:13px 20px;position:sticky;top:0;z-index:100}
.hdr-in{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-size:21px;font-weight:900;color:var(--gold)}.logo-s{font-size:9px;letter-spacing:3px;color:var(--mut);text-transform:uppercase;margin-top:1px}
.lb{display:none;align-items:center;gap:5px;background:#0A1F12;border:1px solid #1A5030;border-radius:4px;padding:3px 9px;font-size:10px;font-weight:800;letter-spacing:2px;color:var(--grn)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes ring{0%,100%{opacity:.4}50%{opacity:.08}}
.nav{display:flex;gap:3px;margin-left:auto;flex-wrap:wrap}
.nb{padding:6px 14px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:transparent;color:var(--mut);transition:all .15s}
.nb.on{background:var(--gold);color:#07090C}.nb:hover:not(.on){color:var(--txt);background:var(--bg3)}
.rfbtn{background:none;border:1px solid var(--bdr);border-radius:5px;color:var(--mut);padding:5px 10px;cursor:pointer;font-size:11px;transition:all .15s}
.rfbtn:hover{border-color:var(--gold);color:var(--gold)}
.upd{font-size:10px;color:var(--mut2)}
.wrap{max-width:1280px;margin:0 auto;padding:20px 16px 48px}
.fbar{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fbar input{background:var(--bg3);border:1px solid var(--bdr2);color:var(--txt);border-radius:6px;padding:7px 12px;font-size:13px;outline:none;flex:1;min-width:130px}
.fbar input::placeholder{color:var(--mut2)}.fbar input:focus{border-color:var(--gold)}
.chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--bdr);background:transparent;color:var(--mut);transition:all .15s}
.chip.on{border-color:var(--gold);background:#1A1200;color:var(--gold)}
.fl{font-size:10px;color:var(--mut);font-weight:700;letter-spacing:2px;text-transform:uppercase}
.gtabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.gt{padding:5px 11px;border-radius:4px;cursor:pointer;border:1px solid var(--bdr);background:transparent;font-size:10px;font-weight:800;letter-spacing:1px;color:var(--mut);transition:all .15s}
.gt.on{background:var(--gold);color:#07090C;border-color:var(--gold)}
.sec{font-size:10px;letter-spacing:3px;color:var(--mut);font-weight:700;text-transform:uppercase;margin-bottom:10px;margin-top:22px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;position:relative;transition:border-color .2s}
.card.live{background:#090F0B;border-color:#1A4A28;box-shadow:0 0 20px rgba(34,197,94,.07)}
.card.fav{border-color:#2A2000}
.ring{position:absolute;inset:-1px;border-radius:10px;border:1px solid var(--grn);opacity:.4;animation:ring 2.2s ease-in-out infinite;pointer-events:none}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.cgrp{font-size:9px;font-weight:900;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase}
.crnd{font-size:9px;color:var(--mut);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.ctr{display:flex;gap:5px;align-items:center}
.lpill{display:flex;align-items:center;gap:4px;background:#0A1F12;border:1px solid #1A5030;border-radius:3px;padding:2px 6px;font-size:8px;font-weight:800;letter-spacing:2px;color:var(--grn)}
.star{background:none;border:none;cursor:pointer;font-size:15px;line-height:1;padding:2px;opacity:.2;transition:all .15s}
.star.on{opacity:1;transform:scale(1.15)}
.mrow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin:8px 0}
.th{text-align:right}.ta{text-align:left}
.fi{display:inline-block;width:28px;height:19px;border-radius:2px;overflow:hidden;vertical-align:middle;box-shadow:0 0 0 1px rgba(255,255,255,.08)}.fi svg{width:100%;height:100%;display:block}
.tn{font-size:13px;font-weight:700;color:#C0D4DE;margin-top:3px}
.sbox{text-align:center;min-width:80px}
.snum{font-size:24px;font-weight:900;color:var(--gold);letter-spacing:-1.5px;line-height:1}
.svs{font-size:18px;font-weight:900;color:var(--mut2)}
.sph{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-top:3px}
.sph.lv{color:var(--grn)}
.cft{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:10px;color:var(--mut2)}
.cact{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
.abtn{display:flex;align-items:center;gap:4px;background:none;border:1px solid var(--bdr);border-radius:4px;padding:4px 9px;cursor:pointer;color:var(--mut);font-size:10px;font-weight:600;transition:all .15s}
.abtn:hover{border-color:var(--gold);color:var(--gold)}
.goals{margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr);display:flex;justify-content:space-between;gap:8px;font-size:10px}
.gc{display:flex;flex-direction:column;gap:2px}.gc.r{align-items:flex-end;text-align:right}
.gi{color:#8AAAB8}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:14px}
.sc{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.sh{padding:9px 14px;background:var(--bg);font-size:10px;font-weight:900;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.st{width:100%;border-collapse:collapse;font-size:11px}
.st th{text-align:center;padding:6px 7px;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--mut);text-transform:uppercase;border-bottom:1px solid var(--bdr)}
.st th:nth-child(2){text-align:left}.st td{padding:8px 7px;text-align:center;color:#A0B8C4;border-bottom:1px solid #0C1018}
.st tr:last-child td{border-bottom:none}.st td:nth-child(2){text-align:left}
.tc{display:flex;align-items:center;gap:6px}
.qb{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.ptc{font-weight:800;color:var(--txt)}
.sleg{padding:6px 14px;font-size:9px;color:var(--mut2);display:flex;gap:12px}
.tsec{margin-bottom:24px}
.tsec-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px 8px 0 0;border-bottom:2px solid var(--gold)}
.tsec-nm{font-size:14px;font-weight:800;color:var(--txt)}
.tsec-sub{font-size:10px;color:var(--mut);margin-left:auto}
.tsec-body{background:var(--bg2);border:1px solid var(--bdr);border-top:none;border-radius:0 0 8px 8px;padding:12px}
.tsec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:8px}
.ufbtn{background:none;border:1px solid var(--bdr);border-radius:4px;padding:4px 10px;cursor:pointer;color:var(--mut);font-size:10px;font-weight:700;transition:all .15s}
.ufbtn:hover{border-color:#E05050;color:#E05050}
.tpick{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tp{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bdr);background:transparent;color:var(--mut);transition:all .15s}
.tp.on{border-color:var(--gold);background:#1A1200;color:var(--gold)}
#toast{position:fixed;bottom:24px;right:20px;background:#0A1F12;border:1px solid var(--grn);border-radius:8px;padding:11px 18px;font-size:13px;color:var(--txt);z-index:9999;max-width:300px;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 4px 24px rgba(0,0,0,.6)}
#toast.show{transform:translateY(0);opacity:1}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
@media(max-width:600px){.grid,.tsec-grid,.sg{grid-template-columns:1fr}.nb{padding:5px 9px;font-size:10px}}
</style>
</head>

<div class="hdr">
  <div class="hdr-in">

    </div>
    <button class="rfbtn" id="rfbtn">&#8635; Refresh</button>
    <span class="upd" id="upd"></span>
  </div>
</div>
<div class="wrap"><div id="app"></div></div>
<div id="toast"></div>

const LS={};
const ST={tab:'today',search:'',grp:'ALL',status:'ALL',expanded:new Set(),
  get favs(){try{return JSON.parse(localStorage.getItem('wc26f')||'[]')}catch{return[]}},
  set favs(v){localStorage.setItem('wc26f',JSON.stringify(v))}
};

function koUTC(m){
  const x=m.t.match(/(\d+):(\d+)\s+UTC([+-]\d+)/);
  if(!x)return null;
  const d=new Date(m.d+'T'+x[1].padStart(2,'0')+':'+x[2]+':00Z');
  d.setHours(d.getHours()-parseInt(x[3]));return d;
}
function mStat(m,i){
  if(m.s)return'FT';
  if(LS[i]!==undefined)return'LIVE';
  const ko=koUTC(m);if(!ko)return'UPCOMING';
  const diff=(Date.now()-ko)/60000;
  if(diff<0)return'UPCOMING';
  if(diff<125)return'LIVE';
  return'UPCOMING';
}
function elapsed(m){const ko=koUTC(m);if(!ko)return 0;return Math.min(Math.floor((Date.now()-ko)/60000),90)}
function koLocal(m){const ko=koUTC(m);return ko?ko.toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):m.d}
function todayStr(){return new Date().toISOString().slice(0,10)}
function tomorrowStr(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10)}
function realTeams(){return[...new Set(RAW.filter(m=>m.grp).flatMap(m=>[m.t1,m.t2]))].sort()}

function calcStandings(){
  const T={};
  RAW.forEach(m=>{
    if(!m.s||!m.grp)return;
    if(!T[m.grp])T[m.grp]={};
    [m.t1,m.t2].forEach(t=>{if(!T[m.grp][t])T[m.grp][t]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}});
    const[s1,s2]=m.s.ft;
    T[m.grp][m.t1].p++;T[m.grp][m.t2].p++;
    T[m.grp][m.t1].gf+=s1;T[m.grp][m.t1].ga+=s2;
    T[m.grp][m.t2].gf+=s2;T[m.grp][m.t2].ga+=s1;
    if(s1>s2){T[m.grp][m.t1].w++;T[m.grp][m.t1].pts+=3;T[m.grp][m.t2].l++}
    else if(s2>s1){T[m.grp][m.t2].w++;T[m.grp][m.t2].pts+=3;T[m.grp][m.t1].l++}
    else{T[m.grp][m.t1].d++;T[m.grp][m.t1].pts++;T[m.grp][m.t2].d++;T[m.grp][m.t2].pts++}
  });
  const R={};
  Object.keys(T).sort().forEach(g=>{
    R[g]=Object.entries(T[g]).map(([t,s])=>({team:t,...s,gd:s.gf-s.ga})).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  });
  return R;
}

let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),3500)}

function addCal(idx){
  const m=RAW[idx],ko=koUTC(m);if(!ko){toast('No kickoff time');return}
  const fmt=d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const end=new Date(ko.getTime()+7200000);
  window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent('\u26BD '+m.t1+' vs '+m.t2+' \u2014 FIFA WC 2026')+'&dates='+fmt(ko)+'/'+fmt(end)+'&details='+encodeURIComponent((m.grp||m.r)+' | '+m.gnd)+'&location='+encodeURIComponent(m.gnd||''),'_blank');
  toast('\uD83D\uDCC5 Opening Google Calendar');
}

function toggleFav(team){
  let f=ST.favs;const i=f.indexOf(team);
  if(i>-1){f.splice(i,1);toast('Removed '+team)}else{f.push(team);toast('\u2B50 Following '+team)}
  ST.favs=f;render();
}

function card(m,idx){
  const st=mStat(m,idx),live=st==='LIVE',done=st==='FT';
  const favs=ST.favs,isFavM=favs.includes(m.t1)||favs.includes(m.t2);
  const showG=ST.expanded.has(idx);
  const hasG=(m.g1&&m.g1.length)||(m.g2&&m.g2.length);
  const lsd=LS[idx];
  const lh=lsd!==undefined?lsd.h:0;
  const la=lsd!==undefined?lsd.a:0;
  const lmin=lsd!==undefined?lsd.min:elapsed(m);
  const lph=lsd?lsd.phase:'';

  let shtml;
  if(done){
    shtml='<div class="snum">'+m.s.ft[0]+' \u2013 '+m.s.ft[1]+'</div><div class="sph">FT'+(m.s.ht?' \u2022 HT '+m.s.ht[0]+'-'+m.s.ht[1]:'')+' </div>';
  }else if(live){
    shtml='<div class="snum" style="color:var(--grn)">'+lh+' \u2013 '+la+'</div><div class="sph lv">\u25CF '+(lph||lmin+"'")+'</div>';
  }else{
    shtml='<div class="svs">vs</div><div class="sph">'+koLocal(m)+'</div>';
  }

  let ghtml='';
  if(hasG&&showG){
    const g1=(m.g1||[]).map(g=>'<div class="gi">\u26BD '+g.n+' '+g.m+"'"+(g.pen?' (P)':'')+(g.og?' <span style="color:#E05050">(OG)</span>':'')+' </div>').join('');
    const g2=(m.g2||[]).map(g=>'<div class="gi">'+g.m+"' "+g.n+' \u26BD'+(g.pen?' (P)':'')+(g.og?' <span style="color:#E05050">(OG)</span>':'')+' </div>').join('');
    ghtml='<div class="goals"><div class="gc">'+(g1||'<span style="color:var(--mut2)">\u2014</span>')+'</div><div class="gc r">'+(g2||'<span style="color:var(--mut2)">\u2014</span>')+'</div></div>';
  }

  return '<div class="card'+(live?' live':isFavM?' fav':'')+'">'+
    (live?'<div class="ring"></div>':'')+
    '<div class="ctop"><div>'+(m.grp?'<div class="cgrp">'+m.grp+'</div>':'')+
    '<div class="crnd">'+m.r+'</div></div>'+
    '<div class="ctr">'+(live?'<div class="lpill"><div class="dot"></div>&nbsp;LIVE</div>':'')+
    '<button class="star'+(favs.includes(m.t1)?' on':'')+'" data-fav="'+encodeURIComponent(m.t1)+'">\u2B50</button></div></div>'+
    '<div class="mrow"><div class="th">'+fi(m.t1)+'<div class="tn"'+(favs.includes(m.t1)?' style="color:var(--gold)"':'')+'>'+m.t1+'</div></div>'+
    '<div class="sbox">'+shtml+'</div>'+
    '<div class="ta">'+fi(m.t2)+'<div class="tn"'+(favs.includes(m.t2)?' style="color:var(--gold)"':'')+'>'+m.t2+'</div></div></div>'+
    '<div class="cft"><span>\uD83D\uDCCD '+m.gnd+'</span></div>'+
    '<div class="cact">'+(!done&&!live&&koUTC(m)?'<button class="abtn" data-cal="'+idx+'">\uD83D\uDCC5 Calendar</button>':'')+
    (hasG?'<button class="abtn" data-exp="'+idx+'">'+(showG?'\u25B2 Hide':'\u26BD Goals')+'</button>':'')+
    '</div>'+ghtml+'</div>';
}

function render(){
  const app=document.getElementById('app');
  const favs=ST.favs,td=todayStr(),tm=tomorrowStr();
  const liveCount=RAW.filter((m,i)=>mStat(m,i)==='LIVE').length;
  document.getElementById('lc').textContent=liveCount;
  document.getElementById('lb').style.display=liveCount?'flex':'none';
  let html='';

  if(ST.tab==='today'){
    const live=RAW.filter((m,i)=>mStat(m,i)==='LIVE');
    const tdMs=RAW.filter((m,i)=>m.d===td&&mStat(m,i)!=='LIVE');
    const tmMs=RAW.filter(m=>m.d===tm);
    const rec=RAW.filter(m=>m.s&&m.d<td).slice(-6).reverse();
    if(live.length)html+='<div class="sec">\uD83D\uDD34 Live Now ('+live.length+')</div><div class="grid">'+live.map(m=>card(m,RAW.indexOf(m))).join('')+'</div>';
    if(tdMs.length)html+='<div class="sec">Today \u2014 '+td+'</div><div class="grid">'+tdMs.map(m=>card(m,RAW.indexOf(m))).join('')+'</div>';
    if(tmMs.length)html+='<div class="sec">Tomorrow \u2014 '+tm+'</div><div class="grid">'+tmMs.map(m=>card(m,RAW.indexOf(m))).join('')+'</div>';
    if(rec.length)html+='<div class="sec">Recent Results</div><div class="grid">'+rec.map(m=>card(m,RAW.indexOf(m))).join('')+'</div>';
    if(!live.length&&!tdMs.length&&!tmMs.length&&!rec.length)html='<div style="text-align:center;padding:48px;color:var(--mut)">No matches today</div>';
  }
  else if(ST.tab==='schedule'){
    const grps=[...new Set(RAW.filter(m=>m.grp).map(m=>m.grp))].sort();
    const fil=RAW.filter((m,i)=>{
      const q=ST.search.toLowerCase(),ms=mStat(m,i);
      const sg=ST.grp==='ALL'?true:ST.grp==='KO'?!m.grp:m.grp===ST.grp;
      return sg&&(ST.status==='ALL'||ms===ST.status)&&(!q||(m.t1+m.t2+(m.gnd||'')).toLowerCase().includes(q));
    });
    html='<div class="fbar"><span class="fl">Search</span><input type="text" id="srch" placeholder="Team or venue\u2026" value="'+ST.search+'">'
      +'<span class="fl">Status</span>'+['ALL','LIVE','UPCOMING','FT'].map(s=>'<button class="chip'+(ST.status===s?' on':'')+'" data-st="'+s+'">'+s+'</button>').join('')+'</div>'
      +'<div class="gtabs">'+['ALL',...grps,'KO'].map(g=>'<button class="gt'+(ST.grp===g?' on':'')+'" data-grp="'+g+'">'+(g==='ALL'?'All Groups':g==='KO'?'Knockout':g.replace('Group ','Grp '))+'</button>').join('')+'</div>'
      +'<div style="font-size:10px;color:var(--mut2);margin-bottom:12px">'+fil.length+' matches \u2022 \uD83D\uDCC5 Calendar adds match reminder to your phone</div>'
      +'<div class="grid">'+fil.map(m=>card(m,RAW.indexOf(m))).join('')+'</div>';
  }
  else if(ST.tab==='standings'){
    const S=calcStandings();
    html='<div style="font-size:10px;color:var(--mut2);margin-bottom:14px">'+RAW.filter(m=>m.s&&m.grp).length+' completed group matches</div>'
      +'<div class="sg">'+Object.keys(S).map(g=>{
        const rows=S[g];
        return '<div class="sc"><div class="sh">'+g+'</div><table class="st"><thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>'
          +rows.map((r,i)=>{
            const qc=i<2?'#22C55E':i===2?'#F5C518':'transparent',fv=favs.includes(r.team);
            return '<tr><td><div style="display:flex;align-items:center;gap:3px"><div class="qb" style="background:'+qc+'"></div>'+(i+1)+'</div></td>'
              +'<td><div class="tc">'+fi(r.team)+'<span style="'+(fv?'color:var(--gold);font-weight:700':'')+'">'+(fv?'\u2B50 ':'')+r.team+'</span></div></td>'
              +'<td>'+r.p+'</td><td>'+r.w+'</td><td>'+r.d+'</td><td>'+r.l+'</td><td>'+r.gf+'</td><td>'+r.ga+'</td><td>'+(r.gd>0?'+':'')+r.gd+'</td><td class="ptc">'+r.pts+'</td></tr>';
          }).join('')+'</tbody></table><div class="sleg"><span><span style="color:#22C55E">\u25A0</span> Qualify</span><span><span style="color:#F5C518">\u25A0</span> Playoff</span></div></div>';
      }).join('')+'</div>';
  }
  else if(ST.tab==='mine'){
    const teams=realTeams();
    if(!favs.length){
      html='<div style="text-align:center;padding:48px"><div style="font-size:48px">\u2B50</div><div style="color:var(--mut);font-size:14px;margin-top:16px">No teams starred yet</div><div style="color:var(--mut2);font-size:12px;margin-top:6px">Tap \u2B50 on any match card</div></div>';
    }else{
      html=favs.map(team=>{
        const tms=RAW.filter(m=>m.t1===team||m.t2===team);
        return '<div class="tsec"><div class="tsec-hdr">'+fi(team)+'<span class="tsec-nm">'+team+'</span>'
          +'<span class="tsec-sub">'+tms.filter(m=>m.s).length+' played \u2022 '+tms.filter(m=>!m.s).length+' remaining</span>'
          +'<button class="ufbtn" data-unfav="'+encodeURIComponent(team)+'">\u2715 Unfollow</button></div>'
          +'<div class="tsec-body"><div class="tsec-grid">'+tms.map(m=>card(m,RAW.indexOf(m))).join('')+'</div></div></div>';
      }).join('');
    }
    html+='<div class="sec" style="margin-top:28px">All Teams \u2014 tap to follow</div><div class="tpick">'+teams.map(t=>'<button class="tp'+(favs.includes(t)?' on':'')+'" data-team="'+encodeURIComponent(t)+'">'+fi(t)+' '+t+'</button>').join('')+'</div>';
  }

  app.innerHTML=html;
  const sr=document.getElementById('srch');
  if(sr)sr.addEventListener('input',e=>{ST.search=e.target.value;render()});
}

document.addEventListener('click',e=>{
  const t=e.target.closest('[data-fav],[data-unfav],[data-team],[data-cal],[data-exp],[data-st],[data-grp],[data-tab]');
  if(!t)return;
  if(t.dataset.fav!==undefined){toggleFav(decodeURIComponent(t.dataset.fav));return}
  if(t.dataset.unfav!==undefined){toggleFav(decodeURIComponent(t.dataset.unfav));return}
  if(t.dataset.team!==undefined){toggleFav(decodeURIComponent(t.dataset.team));return}
  if(t.dataset.cal!==undefined){addCal(parseInt(t.dataset.cal));return}
  if(t.dataset.exp!==undefined){const i=parseInt(t.dataset.exp);ST.expanded.has(i)?ST.expanded.delete(i):ST.expanded.add(i);render();return}
  if(t.dataset.st!==undefined){ST.status=t.dataset.st;render();return}
  if(t.dataset.grp!==undefined){ST.grp=t.dataset.grp;render();return}
  if(t.dataset.tab!==undefined){
    ST.tab=t.dataset.tab;ST.search='';ST.grp='ALL';ST.status='ALL';
    document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.tab===ST.tab));
    render();return;
  }
});

// ── LIVE SCORE REFRESH via Claude API ────────────────────────────────────────
// No refresh needed - all data is embedded
document.getElementById('rfbtn').addEventListener('click', function() {
  toast('✓ Using embedded data (no network fetch needed)');
});

// Boot: seed LS for matches in progress right now
RAW.forEach(function(m, i) {
  if (m.s) return;
  const ko = koUTC(m);
  if (!ko) return;
  const diff = (Date.now() - ko) / 60000;
  if (diff > 0 && diff < 125) {
    LS[i] = {h: 0, a: 0, min: Math.min(Math.floor(diff), 90), phase: ''};
  }
});

render();

// Tick minute counter every 30s
setInterval(function() {
  let changed = false;
  RAW.forEach(function(m, i) {
    if (m.s || LS[i] === undefined) return;
    const ko = koUTC(m);
    if (!ko) return;
    const diff = (Date.now() - ko) / 60000;
    if (diff > 0 && diff < 125) {
      LS[i].min = Math.min(Math.floor(diff), 90);
      changed = true;
    } else {
      delete LS[i];
      changed = true;
    }
  });
  if (changed) render();
}, 30000);


</script>
